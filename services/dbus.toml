name = "dbus"
kind = "longrun"
needs = ["udevd"]
bundles = ["core"]

# The system bus. dbus-daemon creates its socket within milliseconds and
# dependents retry, so plain start-ordering (not readiness) is enough here.
# log = true (F-02, now in mycel-compose) pipes output to a generated dbus-log
# instead of losing it under -B (no catch-all logger).
setup = ["mkdir -p /run/dbus"]
exec = "dbus-daemon --system --nofork --nopidfile"
log = true
