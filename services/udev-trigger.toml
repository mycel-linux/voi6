name = "udev-trigger"
kind = "oneshot"
needs = ["udevd"]
bundles = ["core"]

# Coldplug: replay add events for everything already present, then wait for the
# queue to drain so the compositor/login see input + DRM (/dev/dri) devices.
# A oneshot `up` as a LIST runs the steps in sequence (F-01, now in mycel-compose)
# — no more hand-rolled `/bin/sh -c "...; ...; ..."`.
up = [
    "udevadm trigger --type=subsystems --action=add",
    "udevadm trigger --type=devices --action=add",
    "udevadm settle --timeout=30",
]
