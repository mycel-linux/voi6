name = "elogind"
kind = "longrun"
needs = ["dbus"]
bundles = ["core"]

# The standalone logind (org.freedesktop.login1): session tracking, seat
# assignment, and XDG_RUNTIME_DIR — required by any Wayland session/DE. We run it
# as a supervised service, so dbus must NOT also auto-activate it (bootstrap
# removes the dbus .service file, else dbus spawns a duplicate that fights this
# one for the bus name). Needs cgroup2 mounted (rc.init handles that).
#
# pam_elogind at login talks to login1 on the bus, so a getty that depends on
# elogind must wait until it actually OWNS login1, not just until it started.
# `ready` makes mycel-compose emit the s6-notifyoncheck + notification-fd wiring
# that gates dependents on real readiness — this single line replaced the
# hand-rolled `elogind-ready` oneshot (the F-03 finding, now fixed in the composer).
exec = "/usr/libexec/elogind/elogind"
ready = "dbus:org.freedesktop.login1"
log = true   # F-02: also test ready + log on one service (readiness fd3 + log pipe fd1)
