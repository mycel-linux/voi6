name = "getty-ttyS0"
kind = "longrun"
bundles = ["default"]

# Serial-console login. Essential for headless/QEMU bring-up and CI (the boot is
# captured over ttyS0). agetty -L disables carrier detection for the serial line.
# Caveat: on bare metal with no serial port, ttyS0 is absent and agetty respawns;
# this should become conditional once Voi6 grows past the VM-first stage.
exec = "/usr/bin/agetty -L 115200 ttyS0 linux"
